name: Daily Briefs

on:
  schedule:
    # 11:00 UTC = 08:00 Argentina (UTC-3).
    - cron: "0 11 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # --- Informe IA & Gobernanza ---
  brief-ia:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generar informe IA
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 brief.py --email --out brief.md --out-es brief_es.md
      - uses: actions/upload-artifact@v4
        with:
          name: brief-ia
          path: |
            brief.md
            brief_es.md
          retention-days: 30

  # --- Informe Ciberseguridad ---
  brief-cyber:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generar informe Cyber
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO_CYBER: ${{ secrets.MAIL_TO_CYBER }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 brief_cyber.py --email --out cyber_brief.md --out-es cyber_brief_es.md
      - uses: actions/upload-artifact@v4
        with:
          name: brief-cyber
          path: |
            cyber_brief.md
            cyber_brief_es.md
          retention-days: 30

  # --- Informe GitHub Repos ---
  brief-github:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generar informe GitHub Repos
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          GITHUB_TOKEN: ${{ secrets.GH_SEARCH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 brief_github.py --email --out github_brief.md --out-es github_brief_es.md
      - uses: actions/upload-artifact@v4
        with:
          name: brief-github
          path: |
            github_brief.md
            github_brief_es.md
          retention-days: 30
