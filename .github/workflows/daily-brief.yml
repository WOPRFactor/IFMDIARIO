name: AI Daily Brief

on:
  schedule:
    # 11:00 UTC = 08:00 en Argentina (UTC-3). Ajusta si cambias de zona.
    - cron: "0 11 * * *"
  workflow_dispatch:  # permite ejecutarlo a mano desde la pestana Actions

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # El script usa solo libreria estandar de Python, no hay dependencias.
      - name: Generar y enviar informe
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          # Opcional: si cargas este secret, el informe usa Claude para destacar
          # y resumir lo mas importante. Si no esta, corre en modo simple igual.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 brief.py --email --out brief.md

      - name: Guardar informe como artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-daily-brief
          path: brief.md
          retention-days: 30
