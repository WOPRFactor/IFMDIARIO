name: Daily Briefs

on:
  schedule:
    # 11:00 UTC = 08:00 Argentina (UTC-3).
    - cron: "0 11 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # --- Informe IA & Gobernanza ---
  brief-ia:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install deep-translator
      - name: Generar informe IA
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 brief.py --out brief.md --out-es brief_es.md --html ia.html --html-es ia_es.html
      - uses: actions/upload-artifact@v4
        with:
          name: brief-ia
          path: |
            brief.md
            brief_es.md
            ia.html
            ia_es.html
          retention-days: 30

  # --- Informe Ciberseguridad ---
  brief-cyber:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install deep-translator
      - name: Generar informe Cyber
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO_CYBER: ${{ secrets.MAIL_TO_CYBER }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 brief_cyber.py --out cyber_brief.md --out-es cyber_brief_es.md --html cyber.html --html-es cyber_es.html
      - uses: actions/upload-artifact@v4
        with:
          name: brief-cyber
          path: |
            cyber_brief.md
            cyber_brief_es.md
            cyber.html
            cyber_es.html
          retention-days: 30

  # --- Informe GitHub Repos ---
  brief-github:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install deep-translator
      - name: Generar informe GitHub Repos
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          GITHUB_TOKEN: ${{ secrets.GH_SEARCH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 brief_github.py --out github_brief.md --out-es github_brief_es.md --html github.html --html-es github_es.html
      - uses: actions/upload-artifact@v4
        with:
          name: brief-github
          path: |
            github_brief.md
            github_brief_es.md
            github.html
            github_es.html
          retention-days: 30

  # --- Deploy a GitHub Pages ---
  deploy:
    needs: [brief-ia, brief-cyber, brief-github]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Descargar artifacts
        uses: actions/download-artifact@v4
        with:
          path: _site
          merge-multiple: true
      - name: Crear index principal
        run: |
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="es">
          <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <title>Daily Briefs</title>
          <style>
            body { font-family: -apple-system, "Segoe UI", sans-serif; max-width: 600px;
                   margin: 60px auto; padding: 0 22px; background: #fbfbfd; color: #1a1c23; }
            h1 { font-size: 28px; border-bottom: 2px solid #1a1c23; padding-bottom: 12px; }
            .grid { display: grid; gap: 14px; margin-top: 28px; }
            .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px;
                    padding: 18px 20px; }
            .card h2 { font-size: 16px; margin: 0 0 6px; }
            .card p { font-size: 13px; color: #6b7280; margin: 0 0 12px; }
            .links { display: flex; gap: 10px; }
            a.btn { font-size: 13px; font-weight: 600; text-decoration: none;
                    padding: 5px 14px; border-radius: 6px; }
            a.btn-en { background: #f1f3f5; color: #1a1c23; }
            a.btn-es { background: #3b5bdb; color: #fff; }
          </style>
          </head>
          <body>
          <h1>Daily Briefs</h1>
          <div class="grid">
            <div class="card">
              <h2>IA & Gobernanza</h2>
              <p>Regulacion, gobierno de IA, tecnologia y modelos</p>
              <div class="links">
                <a class="btn btn-en" href="ia.html">EN</a>
                <a class="btn btn-es" href="ia_es.html">ES</a>
              </div>
            </div>
            <div class="card">
              <h2>Ciberseguridad</h2>
              <p>Zero-days, ransomware, vulnerabilidades, vendors</p>
              <div class="links">
                <a class="btn btn-en" href="cyber.html">EN</a>
                <a class="btn btn-es" href="cyber_es.html">ES</a>
              </div>
            </div>
            <div class="card">
              <h2>GitHub Repos</h2>
              <p>Repositorios en tendencia de IA y ciberseguridad</p>
              <div class="links">
                <a class="btn btn-en" href="github.html">EN</a>
                <a class="btn btn-es" href="github_es.html">ES</a>
              </div>
            </div>
          </div>
          </body>
          </html>
          EOF
      - name: Configurar Pages
        uses: actions/configure-pages@v5
      - name: Subir sitio
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
