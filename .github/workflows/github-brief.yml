name: GitHub Repos Brief

on:
  schedule:
    # 11:30 UTC = 08:30 Argentina (UTC-3).
    - cron: "30 11 * * *"
  workflow_dispatch:

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generar y enviar informe
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          # Token de GitHub (opcional): sube el rate limit de 10 a 5000 req/hora.
          GITHUB_TOKEN: ${{ secrets.GH_SEARCH_TOKEN }}
          # Opcional: activa resumen por IA y version en espanol.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 brief_github.py --email --out github_brief.md --out-es github_brief_es.md

      - name: Guardar informes como artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-repos-brief
          path: |
            github_brief.md
            github_brief_es.md
          retention-days: 30
